# ==============================================================================
#                                TMUX CONFIG
# ==============================================================================

# Force Alacritty colors and TrueColor support
set -g default-terminal "alacritty"
set -as terminal-features ",alacritty:RGB"

# Enable mouse (scrolling, selecting panes)
set -g mouse on

# Graphite selection style (matches Alacritty)
set -g mode-style "fg=#ffffff,bg=#44475a"

# Wayland Clipboard Bridge (Essential for copy-paste to work outside terminal)
# This sends your mouse selection directly to the system clipboard
set -s set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Start numbering from 1 for ergonomic reasons
set -g base-index 1
setw -g pane-base-index 1
